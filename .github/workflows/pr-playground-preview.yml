name: PR Playground Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create or update playground preview comment
        uses: actions/github-script@v8
        env:
          PLAYGROUND_URL: https://erseco.github.io/facturascripts-playground/
          PLAYGROUND_IMAGE_URL: https://raw.githubusercontent.com/erseco/facturascripts-playground/main/ogimage.png
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- facturascripts-playground-preview -->';
            const defaultPluginZipUrl =
              'https://github.com/erseco/facturascripts-plugin-PdfFileNamer/archive/refs/heads/main.zip';
            const { owner, repo } = context.repo;
            const pullRequest = context.payload.pull_request;
            const encodedHeadRef = pullRequest.head.ref
              .split('/')
              .map((segment) => encodeURIComponent(segment))
              .join('/');
            const pluginZipUrl = `https://github.com/${owner}/${repo}/archive/refs/heads/${encodedHeadRef}.zip`;
            const blueprintTemplate = fs.readFileSync('blueprint.json', 'utf8');

            if (!blueprintTemplate.includes(defaultPluginZipUrl)) {
              throw new Error('Default plugin ZIP URL was not found in blueprint.json');
            }

            const blueprint = blueprintTemplate.replace(defaultPluginZipUrl, pluginZipUrl);

            const encodeBase64Url = (value) =>
              Buffer.from(value, 'utf8')
                .toString('base64')
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/g, '');

            const previewUrl = `${process.env.PLAYGROUND_URL}?blueprint-data=${encodeBase64Url(
              blueprint,
            )}`;

            const body = [
              marker,
              '## FacturaScripts Playground Preview',
              '',
              `<a href="${previewUrl}">`,
              `  <img src="${process.env.PLAYGROUND_IMAGE_URL}" alt="Open this PR in FacturaScripts Playground" width="220">`,
              '</a><br>',
              `<small><a href="${previewUrl}">Try this PR in your browser</a></small>`,
              '',
              `This preview is generated automatically and loads the plugin directly from the \`${pullRequest.head.ref}\` branch ZIP in FacturaScripts Playground.`,
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pullRequest.number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.body?.includes(marker) && comment.user?.login === 'github-actions[bot]',
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });

              core.info(`Updated existing preview comment: ${existingComment.id}`);
              return;
            }

            const createdComment = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pullRequest.number,
              body,
            });

            core.info(`Created preview comment: ${createdComment.data.id}`);
